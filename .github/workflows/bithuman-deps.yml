name: bithuman-deps

# Dependency automation driven by the bithuman-deps GitHub App. Runs
# Renovate on a schedule; every dependency-update PR it opens is
# authored by bithuman-deps[bot].
#
# Token flow: see .github/SETUP-BOTS.md.

on:
  schedule:
    - cron: '23 * * * 1-5'
    - cron: '23 */6 * * 6,0'
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        required: false
        default: info
        type: choice
        options: [debug, info, warn, error]
      dryRun:
        description: "Dry run (don't open PRs)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: bithuman-deps
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate (bithuman-deps[bot])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mint bithuman-deps[bot] token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BITHUMAN_DEPS_APP_ID }}
          private-key: ${{ secrets.BITHUMAN_DEPS_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@v41.0.0
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == true && 'full' || '' }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: .github/renovate.json
