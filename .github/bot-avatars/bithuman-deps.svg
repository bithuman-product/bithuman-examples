<?xml version="1.0" encoding="UTF-8"?>
<!--
  bithuman-deps[bot] avatar.

  Same brand-coral field and abstract "b" mark as bithuman-ci, with a
  navy package-arrow badge signalling the dependency-automation role.
  No face, no human features. Flat; GitHub rounds to a circle.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="bithuman-deps bot avatar">
  <rect width="512" height="512" rx="96" ry="96" fill="#EF6B5A"/>

  <g fill="#FFFFFF">
    <rect x="138" y="96" width="56" height="272" rx="28"/>
    <circle cx="256" cy="296" r="84"/>
    <circle cx="256" cy="296" r="40" fill="#EF6B5A"/>
  </g>

  <!-- Role badge: navy disc with a downward-arrow-into-tray glyph, bottom-right. -->
  <g transform="translate(344 344)">
    <circle r="76" fill="#14304B"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="16"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 -40 V 16"/>
      <path d="M -22 -6 L 0 16 L 22 -6"/>
      <path d="M -36 32 H 36"/>
    </g>
  </g>
</svg>
