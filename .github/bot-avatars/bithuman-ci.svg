<?xml version="1.0" encoding="UTF-8"?>
<!--
  bithuman-ci[bot] avatar.

  Logo-variant glyph — no face, no human features. Brand-coral field,
  a stacked "b" mark rendered as two simple geometric primitives (bowl +
  ascender), and a navy check-mark badge in the corner signalling the
  bot's CI role. Render flat; GitHub rounds the corners into a circle.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="bithuman-ci bot avatar">
  <rect width="512" height="512" rx="96" ry="96" fill="#EF6B5A"/>

  <!-- Abstract "b" mark: ascender + bowl. Kept deliberately simple so it
       reads at 40px avatar size on a PR timeline. -->
  <g fill="#FFFFFF">
    <rect x="138" y="96" width="56" height="272" rx="28"/>
    <circle cx="256" cy="296" r="84"/>
    <circle cx="256" cy="296" r="40" fill="#EF6B5A"/>
  </g>

  <!-- Role badge: navy disc with white checkmark, bottom-right. -->
  <g transform="translate(344 344)">
    <circle r="76" fill="#14304B"/>
    <path d="M -34 4 L -10 30 L 36 -22" fill="none" stroke="#FFFFFF"
          stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
